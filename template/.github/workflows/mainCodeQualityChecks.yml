name: Code Quality Checks

on:
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Prettier + ESLint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 1️⃣ Prettier (formatting)
      - name: Prettier check
        run: npm run format:check

      # 2️⃣ ESLint (code quality)
      - name: ESLint check
        run: npm run lint
